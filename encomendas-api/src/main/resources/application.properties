spring.application.name=encomendas-api
server.port=${SERVER_PORT:8080}

# --- Perfil Ativo ---
# Default: prod (seguro). Para desenvolvimento local, use: SPRING_PROFILES_ACTIVE=dev
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# --- Banco de Dados ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sistema_encomendas}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# --- JWT (Seguranca) ---
# OBRIGATORIO: Definir via variavel de ambiente APP_JWT_SECRET
app.jwtSecret=${APP_JWT_SECRET}
app.jwtExpirationInMs=86400000

# --- Chaves de Registro (Seguranca) ---
# OBRIGATORIO: Definir via variaveis de ambiente
app.registrationKey=${APP_REGISTRATION_KEY}
app.adminRegistrationKey=${APP_ADMIN_REGISTRATION_KEY}

# --- Email (Gmail SMTP) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# --- Compressao GZIP ---
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# --- Pool de Conexoes HikariCP ---
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=Encomendas-HikariPool

# --- Tratamento de Erros ---
server.error.include-message=never
server.error.include-stacktrace=never

# --- Upload de Ficheiros ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
app.upload.dir=uploads

# --- CORS (Integracao Frontend) ---
cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:4200}

# --- Suporte / Tickets ---
app.support.dev-email=${APP_SUPPORT_DEV_EMAIL:}

# --- Supabase Realtime (Broadcast para chat) ---
supabase.url=${SUPABASE_URL:}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}

# --- Actuator (Health Check para Docker) ---
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never