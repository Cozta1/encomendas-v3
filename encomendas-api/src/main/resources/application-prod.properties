# =============================================
# PERFIL DE PRODUCAO (prod)
# Ativado por default ou com: SPRING_PROFILES_ACTIVE=prod
# =============================================
# Todas as secrets DEVEM ser fornecidas via variaveis de ambiente.
# A aplicacao NAO inicia se APP_JWT_SECRET, APP_REGISTRATION_KEY ou
# APP_ADMIN_REGISTRATION_KEY nao estiverem definidas.

# --- Hibernate ---
# 'validate' em producao: nao altera schema automaticamente.
# Para alteracoes de schema, usar migracao manual ou Flyway.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# --- Esconder detalhes de erro do cliente ---
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# --- Logging de producao ---
logging.level.root=WARN
logging.level.com.benfica.encomendas_api=INFO
logging.level.org.springframework.security=WARN