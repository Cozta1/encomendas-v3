# =============================================
# PERFIL AWS (aws)
# Ativado com: SPRING_PROFILES_ACTIVE=aws
# Para uso com App Runner + RDS + S3
# =============================================

# --- Hibernate ---
# 'validate' em cloud: nao altera schema automaticamente.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# --- HikariCP otimizado para instancias pequenas ---
# App Runner 0.25 vCPU / 0.5GB RAM: pool reduzido
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# --- S3 Storage ---
app.storage.s3.bucket=${AWS_S3_BUCKET}
app.storage.s3.region=${AWS_REGION:us-east-1}

# --- Esconder detalhes de erro ---
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# --- Logging ---
logging.level.root=WARN
logging.level.com.benfica.encomendas_api=INFO
logging.level.org.springframework.security=WARN
logging.level.software.amazon.awssdk=WARN
